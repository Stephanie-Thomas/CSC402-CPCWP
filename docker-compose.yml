services:
  leetcode_api:
    build:
      context: ./leetcode-api
      dockerfile: Dockerfile
    container_name: leetcode-api
    ports: []
    restart: always
    environment:
      - WDS_SOCKET_HOST=127.0.0.1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REDIS_HOST=redis  
      - REDIS_PORT=6379  
    volumes:
      - ./leetcode-api:/usr/src/app
      - /usr/src/app/node_modules
    
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend-node
    
  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: backend-node
    ports: []
    depends_on:
      - redis
      - leetcode_api
    environment:
      - REDIS_HOST=redis 
      - REDIS_PORT=6379
      - MONGO_URI=${MONGO_URI}  # Load from .env file
    env_file:
      - .env
      
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    restart: on-failure
    networks:
      - app-network
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock 
    user: root
    platform: linux/amd64 
    privileged: true 
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"  
    
networks:
  app-network:
    driver: bridge

volumes:
  jenkins-data:
    