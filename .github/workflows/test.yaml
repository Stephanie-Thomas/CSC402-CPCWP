name: Testing

on:
  push:
    branches:
      - CI/CD

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Docker Buildx
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: |
            ~/.docker/buildx-cache
            /tmp/buildx
          key: ${{ runner.os }}-docker-buildx-${{ hashFiles('**/Dockerfile', '**/docker-compose.yml', '**/package*.json') }}
          restore-keys: |
            ${{ runner.os }}-docker-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
          buildkitd-flags: --debug --allow-insecure-entitlement security.insecure

      - name: Build with Cache
        run: |
          docker buildx build \
            --cache-from type=local,src=~/.docker/buildx-cache \
            --cache-to type=local,dest=~/.docker/buildx-cache,mode=max \
            --progress plain \
            -f docker-compose.yml \
            .

      - name: Start Containers
        run: docker compose up -d

      - name: Check service connectivity
        run: |
          for port in 3000 3001 4000 6379; do
            echo "Checking port $port..."
            timeout 10 bash -c "until echo > /dev/tcp/localhost/$port; do sleep 1; done"
            echo "Port $port is accessible."
          done

      - name: Stop Containers
        run: docker compose down