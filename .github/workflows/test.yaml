name: Testing

on:
  push:
    branches:
      - CI/CD

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Cache Directory
        run: mkdir -p ~/.docker/buildx-cache

      - name: Cache Docker Buildx
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: ~/.docker/buildx-cache
          key: ${{ runner.os }}-docker-buildx-${{ hashFiles('**/Dockerfile', '**/docker-compose.yml') }}
          restore-keys: |
            ${{ runner.os }}-docker-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
          buildkitd-flags: --debug

      - name: Build Services
        run: |
          docker buildx bake \
            --file docker-compose.yml \
            --set *.cache-from=type=local,src=$HOME/.docker/buildx-cache \
            --set *.cache-to=type=local,dest=$HOME/.docker/buildx-cache,mode=max \
            --progress plain

      - name: Start Containers
        run: docker compose up -d

      - name: Check service connectivity
        run: |
          for port in 3000 3001 4000 6379; do
            echo "Checking port $port..."
            timeout 10 bash -c "until echo > /dev/tcp/localhost/$port; do sleep 1; done"
            echo "Port $port is accessible."
          done

      - name: Stop Containers
        run: docker compose down