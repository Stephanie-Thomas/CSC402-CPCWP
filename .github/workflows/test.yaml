name: Testing

on:
  push:
    branches:
      - CI/CD

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (with caching)
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      - name: Build services in parallel
        run: docker compose build --parallel
        env:
          BUILDKIT_INLINE_CACHE: 1

      - name: Start Containers
        run: docker compose up -d

      - name: Check service connectivity
        run: |
          for port in 3000 3001 4000 6379; do
            echo "Checking port $port..."
            timeout 30 bash -c "until echo > /dev/tcp/localhost/$port; do sleep 1; done"
            echo "Port $port is accessible."
          done

      - name: Stop Containers
        run: docker compose down